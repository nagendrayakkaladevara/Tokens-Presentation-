<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tokens Presentation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="presentation">
    <section class="slide slide--active" data-slide="1">
      <div class="slide__inner">
        <span class="slide__label">Screen 1</span>
        <h1 class="slide__title">What is Tokens?</h1>
        <p class="slide__sentence">
          A token is a digital unit of value that represents ownership, access, or utility on a blockchain.
        </p>
      </div>
      <div class="slide__accent" aria-hidden="true"></div>
    </section>
  </div>

  <footer class="controls">
    <span class="controls__counter"><span id="current">1</span> / <span id="total">1</span></span>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
